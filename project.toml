[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bwdk-sdk"
version = "0.1.0"
authors = [
  { name="Digify Team", email="digify.eng.team@gmail.com" },
]
description = "A Python SDK for integrating with the BuyWithDigikala service."
readme = "README.md"
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests>=2.32.5",
]

[project.urls]
"Homepage" = "https://github.com/digifyengteam/BuyWithDigikala-SDK-Python"
"Bug Tracker" = "https://github.com/digifyengteam/BuyWithDigikala-SDK-Python/issues"

[tool.setuptools.packages.find]
where = ["src"]